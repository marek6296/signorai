name: Full Automation Bot Cron

on:
  schedule:
    # Kontroluje každých 15 minút (spustí bota, len ak je na webe nastavený tento čas)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Obsahuje manuálne tlačidlo "Run workflow" v GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Full Automation Bot API
        run: |
          # Vola API a ak je workflow spustene ročne (z UI), prida parameter ignoreTime
          # To znamená, že autmatizovaný cron najprv skontroluje, aký čas má nastavený v DB
          # a proces vykoná iba ak sa nachádza v príslušnom okne.
          curl -X GET "${{ secrets.API_BASE_URL }}/api/admin/bot-full-automation?secret=${{ secrets.ADMIN_SECRET }}${{ github.event_name == 'workflow_dispatch' && '&ignoreTime=true' || '' }}"
