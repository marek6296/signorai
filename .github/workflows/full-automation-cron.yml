name: Full Automation Bot Cron

on:
  schedule:
    # Kontroluje každých 15 minút (spustí bota, len ak je na webe nastavený tento čas)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Obsahuje manuálne tlačidlo "Run workflow" v GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Full Automation Bot API
        run: |
          curl -X GET -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}" "${{ secrets.API_BASE_URL }}/api/admin/bot-full-automation${{ github.event_name == 'workflow_dispatch' && '?ignoreTime=true' || '' }}"
